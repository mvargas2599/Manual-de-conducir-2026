<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Manual de conducir 2026</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f7; padding: 20px; line-height: 1.6; }
        .container { max-width: 850px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 5px; }
        .instrucciones { text-align: center; color: #7f8c8d; margin-bottom: 30px; }
        .pregunta-bloque { margin-bottom: 25px; padding: 20px; border-radius: 8px; border: 1px solid #dee2e6; background: #fff; position: relative; }
        .pregunta-texto { font-weight: bold; font-size: 1.1em; display: block; margin-bottom: 15px; color: #34495e; padding-right: 100px; }
        .btn-audio { position: absolute; top: 20px; right: 20px; background: #3498db; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-size: 14px; }
        .btn-audio:hover { background: #2980b9; }
        .opciones label { display: block; margin-bottom: 10px; cursor: pointer; padding: 10px; border-radius: 5px; transition: background 0.2s; }
        .opciones label:hover { background: #f8f9fa; }
        .opciones input { margin-right: 10px; transform: scale(1.2); }
        .btn-calificar { display: block; width: 100%; padding: 18px; background-color: #27ae60; color: white; border: none; border-radius: 8px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 30px; transition: 0.3s; }
        .btn-calificar:hover { background-color: #219150; box-shadow: 0 5px 15px rgba(39,174,96,0.3); }
        #resultado { margin-top: 25px; padding: 20px; border-radius: 8px; display: none; text-align: center; font-size: 24px; font-weight: bold; background: #34495e; color: white; }
        .feedback { margin-top: 10px; padding: 8px; border-radius: 4px; font-weight: bold; }
        .correcta { color: #27ae60; background: #e8f5e9; }
        .incorrecta { color: #e74c3c; background: #ffebee; }
    </style>
</head>
<body>

<div class="container">
    <h1>Compartir el Camino</h1>
    <p class="instrucciones">Presiona el botón azul "🔊 Escuchar" para oír la pregunta y sus opciones.</p>
    
    <form id="examenForm">
        <div id="preguntas-contenedor"></div>
        <button type="button" class="btn-calificar" onclick="calificar()">CALIFICAR EXAMEN</button>
    </form>
    
    <div id="resultado"></div>
</div>

<script>
const bancoPreguntas = [
    { q: "1. Cuando los automovilistas giran a la derecha y se acerca un ciclista por su lado derecho, deben dejar que el ciclista cruce la intersección antes de girar a la derecha .", options: ["Verdadero", "Falso"], a: 0 },
    { q: "2. Un conductor no necesita mantener tanta distancia de una motocicleta como de un automóvil.", options: ["Verdadero", "Falso"], a: 1 },
    { q: "3. Los motociclistas tienen derecho a usar todo el ancho de un carril de transito; por lo tanto, un conductor debe rebasar a una motocicleta de la misma manera que rebasaría a otro vehículo", options: ["Verdadero", "Falso"], a: 0 },
    { q: "4. Cuando sigan a un camion de noche, es importante que los conductores atenúen los faros de sus vehículos.", options: ["Verdadero", "Falso"], a: 0 },
    { q: "5. Al acercarse a un peatón discapacitado con un perro de guía, un bastón blanco u otro dispositivo de asistencia, el conductor debe ceder el paso.", options: ["Verdadero", "Falso"], a: 0 },
    { q: "6. Al abrir la puerta del lado del conductor en una carretera con transito de vehículos y bicicletas en sentido opuesto, usted debe:", options: ["A. Abrir la puerta del vehículo estirando la mano derecha para tener una mejor vista del transito de vehículos y bicicletas que se aproxima desde atras.", "B. Abrir la puerta del vehículo solo cuando no interfiera con el transito de vehículos y bicicletas que se aproxima desde atrás.", "C. Abrir la puerta del vehículo con la mano izquierda y luego verificar el transito de vehículos y bicicletas que se aproxima.", "D. Tanto A como B."], a: 3 },
];

const contenedor = document.getElementById('preguntas-contenedor');

bancoPreguntas.forEach((p, i) => {
    let opcionesTexto = p.options.join(". ");
    let textoCompleto = `${p.q} Opciones: ${opcionesTexto}`;
    
    let html = `
    <div class="pregunta-bloque">
        <button type="button" class="btn-audio" onclick="leer('${textoCompleto.replace(/'/g, "")}')">🔊 Escuchar</button>
        <span class="pregunta-texto">${p.q}</span>
        <div class="opciones">`;
    
    p.options.forEach((opt, index) => {
        html += `<label><input type="radio" name="p${i}" value="${index}"> ${opt}</label>`;
    });
    
    html += `</div><div id="res-p${i}" class="feedback" style="display:none;"></div></div>`;
    contenedor.innerHTML += html;
});

function leer(texto) {
    window.speechSynthesis.cancel(); // Detiene cualquier audio previo
    const lectura = new SpeechSynthesisUtterance(texto);
    lectura.lang = 'es-US';
    lectura.rate = 0.9; // Velocidad un poco más lenta para claridad
    window.speechSynthesis.speak(lectura);
}

function calificar() {
    let score = 0;
    bancoPreguntas.forEach((p, i) => {
        const seleccion = document.querySelector(`input[name="p${i}"]:checked`);
        const feedback = document.getElementById(`res-p${i}`);
        feedback.style.display = "block";
        
        if (seleccion && parseInt(seleccion.value) === p.a) {
            score++;
            feedback.innerHTML = "✓ Correcta";
            feedback.className = "feedback correcta";
        } else {
            feedback.innerHTML = "✗ Incorrecta. La respuesta correcta era: " + p.options[p.a];
            feedback.className = "feedback incorrecta";
        }
    });
    
    const resultDiv = document.getElementById('resultado');
    resultDiv.style.display = "block";
    resultDiv.innerHTML = "Puntaje final: " + score + " / " + bancoPreguntas.length;
    window.scrollTo(0, 0);
}
</script>
</body>
</html>
